bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: "map"
    robot_base_frame: "base_footprint"
    odom_topic: "merged_odom"
    bt_loop_duration: 10
    filter_duration: 0.3
    default_server_timeout: 20
    wait_for_service_timeout: 1000
    service_introspection_mode: "disabled"
    error_code_names: ["follow_path_error_code", "compute_path_error_code", "backup_error_code"]
    navigators: ["navigate_to_pose", "navigate_through_poses"]
    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator"
    navigate_through_poses:
      plugin: "nav2_bt_navigator::NavigateThroughPosesNavigator"

controller_server:
  ros__parameters:
    use_sim_time: false
    global_frame: "map"
    odom_topic: "merged_odom"
    enable_stamped_cmd_vel: false
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.0001
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["stopped_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::PoseProgressChecker"
      required_movement_radius: 0.1
      required_movement_angle: 0.25
      movement_time_allowance: 10.0

    stopped_goal_checker:
      stateful: false
      plugin: "nav2_controller::StoppedGoalChecker"
      trans_stopped_velocity: 0.05
      rot_stopped_velocity: 0.05
      xy_goal_tolerance: 0.2
      yaw_goal_tolerance: 0.5

    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      max_linear_vel: 0.5
      # Ackermann control parameters
      wheelbase: 0.382
      track_width: 0.385
      max_steering_angle: 1.08
      max_steering_angle_velocity: 4.0
      steering_angle_tolerance: 0.8
      steering_angle_release_tolerance: 0.05
      ackermann_acceleration: 1.7
      ackermann_jerk: 8.0
      # max_angular_accel and max_angular_decel are not considered when using Ackermann publishing
      #max_angular_accel: 2.0
      #max_angular_decel: -2.0

      use_dynamic_window: true
      min_segment_length: 0.1  # Minimum arc length (m) a cusp-separated path segment must have to be selected as the path to follow
      # Params only used if use_dynamic_window is true      
      min_linear_vel: -0.5
      #max_angular_vel: 1.7
      #min_angular_vel: -1.7
      max_linear_accel: 2.0
      max_linear_decel: -5.0
      # Note to self: remember that anything to do with path end will apply to cusps with modified nav2_controller

      use_velocity_scaled_lookahead_dist: true
      # Params only used if use_velocity_scaled_lookahead_dist is true
      min_lookahead_dist: 0.25
      max_lookahead_dist: 0.5
      lookahead_time: 0.8
      # Params only used if use_velocity_scaled_lookahead_dist is false
      lookahead_dist: 0.25

      use_regulated_linear_velocity_scaling: true
      # Params only used if use_regulated_linear_velocity_scaling is true
      regulated_linear_scaling_min_radius: 0.5
      regulated_linear_scaling_min_speed: 0.15

      use_cost_regulated_linear_velocity_scaling: true
      # Params only used if use_cost_regulated_linear_velocity_scaling is true
      cost_scaling_dist: 0.25
      cost_scaling_gain: 0.7
      inflation_cost_scaling_factor: 7.0

      min_approach_linear_velocity: 0.08
      approach_velocity_scaling_dist: 0.4
      use_collision_detection: true
      max_allowed_time_to_collision_up_to_carrot: 1.0

      use_fixed_curvature_lookahead: true
      curvature_lookahead_dist: 0.35
      use_rotate_to_heading: false
      interpolate_curvature_after_goal: false
      allow_reversing: true
      transform_tolerance: 0.1
      
      use_cancel_deceleration: false
      # Params only used if use_cancel_deceleration is true
      cancel_deceleration: 3.2

behavior_server:
  ros__parameters:
    use_sim_time: false
    local_frame: "odom"
    global_frame: "map"
    robot_base_frame: "base_footprint"
    transform_tolerance: 0.3
    simulate_ahead_time: 2.0
    cycle_frequency: 10.0
    behavior_plugins: ["backup", "wait"]
    backup:
      plugin: "nav2_behaviors::BackUp"
    wait:
      plugin: "nav2_behaviors::Wait"
    enable_stamped_cmd_vel: false
    backup.acceleration_limit: 1.5
    backup.minimum_speed: 0.1

global_costmap:
  global_costmap:
    ros__parameters:
      # Adjust for the size of the environment
      height: 20
      width: 20
      origin_x: -10.0
      origin_y: -10.0
      resolution: 0.05
      rolling_window: false
      trinary_costmap: true
      unknown_cost_value: 255
      lethal_cost_threshold: 100
      track_unknown_space: true
      always_send_full_costmap: true
      use_maximum: false
      global_frame: "map"
      robot_base_frame: "base_footprint"
      transform_tolerance: 0.5
      footprint_padding: 0.03
      footprint: "[[0.10, 0.25], [0.10, -0.25], [-0.45, -0.25], [-0.45, 0.25]]"
      publish_frequency: 1.0
      update_frequency: 1.0
      use_sim_time: false
      plugins: ["static_layer", "obstacle_layer", "denoise_layer", "inflation_layer"]

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_topic: "/map"
        map_subscribe_transient_local: true
        enabled: true
        subscribe_to_updates: true
        transform_tolerance: 0.5

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        footprint_clearing_enabled: true
        observation_sources: pointcloud scan
        combination_method: 1
        scan:
          topic: "/rplidar/scan_filtered"
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 10.0
          raytrace_min_range: 0.15
          obstacle_max_range: 10.0
          obstacle_min_range: 0.15
        pointcloud:
          topic: "/nav2/points"
          data_type: PointCloud2
          expected_update_rate: 1.0
          min_obstacle_height: 0.07
          max_obstacle_height: 0.35
          inf_is_valid: false
          marking: true
          clearing: true
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 3.0
          obstacle_min_range: 0.0

      denoise_layer:
        plugin: "nav2_costmap_2d::DenoiseLayer"
        enabled: true

      inflation_layer:
        enabled: true
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.56 # Must be above 0.557
        cost_scaling_factor: 7.0

local_costmap:
  local_costmap:
    ros__parameters:
      height: 6
      width: 6
      resolution: 0.05
      rolling_window: true
      trinary_costmap: true
      unknown_cost_value: 255
      lethal_cost_threshold: 100
      track_unknown_space: false
      always_send_full_costmap: true
      use_maximum: false
      global_frame: "odom"
      robot_base_frame: "base_footprint"
      transform_tolerance: 1.0
      footprint_padding: 0.03
      footprint: "[[0.10, 0.25], [0.10, -0.25], [-0.45, -0.25], [-0.45, 0.25]]"
      update_frequency: 2.0
      publish_frequency: 1.0
      use_sim_time: false
      plugins: ["obstacle_layer", "denoise_layer", "inflation_layer"]

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        footprint_clearing_enabled: true
        observation_sources: pointcloud scan
        combination_method: 1
        scan:
          topic: "/rplidar/scan_filtered"
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 10.0
          raytrace_min_range: 0.15
          obstacle_max_range: 10.0
          obstacle_min_range: 0.15
        pointcloud:
          topic: "/nav2/points"
          data_type: PointCloud2
          expected_update_rate: 1.0
          min_obstacle_height: 0.07
          max_obstacle_height: 0.35
          inf_is_valid: false
          marking: true
          clearing: true
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 3.0
          obstacle_min_range: 0.0

      denoise_layer:
        plugin: "nav2_costmap_2d::DenoiseLayer"
        enabled: true

      inflation_layer:
        enabled: true
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.56 # Must be above 0.557
        cost_scaling_factor: 7.0

planner_server:
  ros__parameters:
    expected_planner_frequency: 1.0
    use_sim_time: false
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_smac_planner::SmacPlannerHybrid"
      downsample_costmap: false
      downsampling_factor: 1
      tolerance: 0.25
      allow_unknown: false
      terminal_checking_interval: 5000
      max_iterations: 1000000
      max_on_approach_iterations: 1000
      max_planning_time: 5.0
      motion_model_for_search: "REEDS_SHEPP"
      angle_quantization_bins: 72
      analytic_expansion_max_cost: 200.0
      analytic_expansion_ratio: 3.5
      analytic_expansion_max_length: 1.5
      analytic_expansion_max_cost_override: false
      minimum_turning_radius: 0.25
      reverse_penalty: 3.0
      change_penalty: 2.0
      non_straight_penalty: 1.2
      cost_penalty: 2.0
      retrospective_penalty: 0.015
      lookup_table_size: 10.0
      cache_obstacle_heuristic: false
      debug_visualizations: false
      use_quadratic_cost_penalty: false
      downsample_obstacle_heuristic: true
      allow_primitive_interpolation: false
      # Not implemented yet in Jazzy
      #goal_heading_mode: "DEFAULT" # Plans to a goal pose with a specific heading, use "ALL_DIRECTION" mode to plan to a goal pose with any heading
      #coarse_search_resolution: 4
      smooth_path: true
      smoother:
        max_iterations: 1000
        w_smooth: 0.3
        w_data: 0.2
        tolerance: 1.0e-10
        do_refinement: true
        refinement_num: 2

waypoint_follower:
  ros__parameters:
    use_sim_time: false
    stop_on_failure: true
    loop_rate: 10
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: true
      waypoint_pause_duration: 200

lifecycle_manager_navigation:
  ros__parameters:
    use_sim_time: false
    autostart: true
    node_names:
      - "planner_server"
      - "controller_server"
      - "behavior_server"
      - "bt_navigator"
      - "waypoint_follower"
    bond_timeout: 4.0
    attempt_respawn_reconnection: true
    bond_respawn_max_duration: 10.0